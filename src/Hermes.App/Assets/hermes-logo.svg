<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#2563EB" />
  
  <!-- Envelope body -->
  <rect x="44" y="76" width="168" height="120" rx="8" fill="white" opacity="0.95"/>
  
  <!-- Envelope flap (V shape) -->
  <polygon points="44,76 128,148 212,76" fill="white" stroke="#2563EB" stroke-width="3" opacity="0.9"/>
  
  <!-- Envelope flap shadow line -->
  <line x1="44" y1="76" x2="128" y2="148" stroke="#93C5FD" stroke-width="2.5"/>
  <line x1="212" y1="76" x2="128" y2="148" stroke="#93C5FD" stroke-width="2.5"/>
  
  <!-- Dollar badge circle -->
  <circle cx="192" cy="84" r="36" fill="#10B981" stroke="white" stroke-width="4"/>
  
  <!-- Dollar sign -->
  <text x="192" y="97" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="42" fill="white">$</text>
</svg>
